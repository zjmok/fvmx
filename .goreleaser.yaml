version: 2
before:
  hooks:
    - go mod tidy
builds:
  - binary: fvmx
    goos: [windows, darwin, linux]
    goarch: [amd64, arm64]
    main: ./cmd/fvmx
    ldflags:
      - -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
